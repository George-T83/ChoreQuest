<div class="app-container">
  <app-top-navbar
    [pageTitle]="pageTitle"
    [showResetButton]="showResetButton && currentPage === 'leaderboard'"

    (logoutClicked)="onLogout()"

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <app-bottom-navbar [currentPage]="currentPage"></app-bottom-navbar>
</div>
